services:
  - type: web
    name: zomate-fitness-backend
    env: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_BASE_URL
        value: https://zomate-fitness-system-back.onrender.com
      - key: UPLOADS_DIR
        value: /app/uploads
      - key: KEEPALIVE_ENABLED
        value: "true"
