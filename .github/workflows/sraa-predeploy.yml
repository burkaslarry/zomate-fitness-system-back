# [F015][S006] SRAA — Security Risk Assessment gate before merge/deploy
name: SRAA Pre-Deploy Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt pip-audit

      - name: pip-audit gate
        run: python -m pip_audit -r requirements.txt

      - name: Pytest smoke
        run: python -m pytest tests/test_health.py tests/test_keepalive.py -q
